<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- append is used to insert the content inside end of the element
     And we can insert multiple element by using the Append -->

    <div id="para"></div>

    <button onclick="append()">click</button>
    


    <script>
        function append(){

            const value=document.getElementById("para")
            const paragraph=document.createElement("p")
            paragraph.textContent="op mere bhai kaise hai"
           

            const some=document.createElement("p")
            some.textContent="ekdam fine hu bhai"
            some.style.backgroundColor="green"
                    value.append(paragraph,some)
        }
    </script>
</body>
</html>
